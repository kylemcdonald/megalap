name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install build tooling
        run: python -m pip install -U pip build twine pytest

      - name: Build sdist
        run: python -m build --sdist

      - name: Check sdist metadata
        run: python -m twine check dist/*

      - name: Smoke test sdist install
        run: python -m pip install --force-reinstall dist/*.tar.gz && python -m pytest -q tests/test_smoke.py

      - uses: actions/upload-artifact@v6
        with:
          name: dist-sdist
          path: dist/*
          if-no-files-found: error

  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-14]

    steps:
      - uses: actions/checkout@v6

      - uses: pypa/cibuildwheel@v3.0.1
        with:
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v6
        with:
          name: dist-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-sdist, build-wheels]
    environment:
      name: pypi
      url: https://pypi.org/p/megalap
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
