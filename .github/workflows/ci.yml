name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -U pip && python -m pip install -e '.[test]'

      - name: Run tests
        run: python -m pytest -q

  dist:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install release tooling
        run: python -m pip install -U pip build twine pytest

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Smoke test sdist install
        run: python -m pip install --force-reinstall dist/*.tar.gz && python -m pytest -q tests/test_smoke.py

      - uses: actions/upload-artifact@v6
        with:
          name: ci-dist
          path: dist/*
          if-no-files-found: error
